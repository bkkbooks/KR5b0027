front:
  text: 太上洞玄靈寳四方大願經天尊言學道之士深處山林或宫觀壇靖積行修功輔元賛化以冀仙道當發四方大願朝夕行之自然與道合眞萬神恊助一飲一食皆有祝願念念不忘於國於巳以及一切能依修之仙道可冀於道近矣先發四方大願歸身歸神歸命東方巳得道大聖衆至眞諸君丈人乞賜臣等十四福一者身無疾病不遭衆患永離痛惱十苦八難二者爲地祗所畏天神所敬妖惡自滅心神端正三者天神識別得在福地四者制鬼治病舉向如願五者行來坐起夭神衛護六者諸所造詣災禍自消福德臻集道德日至七者居危得福苦痛安寜八者爲三界所稱列號眞八九者邪穢悉除身香體潔淨如金玊德行清白表裹精堅十者願無不獲志無不克十一者爲諸天神聖一切所宗十二者道成德就白日昇天十三者福慶之兆上延先祖福流子孫十四者門内眷屬普得延年與道合同歸身歸神歸命南方巳得道大聖衆至眞諸君丈人乞成十一念願一者念帝王國主吏長官屬福慶日臻二者念德行自然不犯經戒道德尊大普所希願三者念悔過首罪不敢有所蔽匿叩頭自搏禮拜盡心四者念願求神仙得見眞君免度世厄爲後世種民五者念永離苦難所求如願六者念願昇度乘雲駕鶴七者念爲億曽萬祖上世父母逮及臣身解除生死宿考重罪八者念爲合家所有戚屬常承慶福九者念後世子孫求恩獲利十者念爲一切衆生蜎飛蠢動之類普蒙恩潤十一者念遠離榮華奸妖邪謟𦍙孽鬼神收鬼制奸免度災厄十苦八難克獲上仙白日昇天仙度之後與道合同歸身歸神歸命西方巳得道大聖衆至眞諸君丈人乞賜九福一者見世安穩不遭衆横二者相好澄明終不迷惑三者所願分明不落闇㝠之處四者榮名赫赫奸邪退伏五者功成德就爲大聖所敬六者疾病除愈不墮惡道七者福慶之兆上延先祖下流子孫八者享福護慶災害消亡九者克得上仙白日昇天仙度之後與道合同歸身歸神歸命北方巳得道大聖衆至眞諸君丈人乞願七福一者今無勞塵耻辱之事二者德行清白容貌端正光色鮮明有如珠玊衆人樂見三者奸邪謟偽妖孽雜俗所不能穢四者三界一切大聖鬼神莫不恭敬五者善功日昇惡道消滅六者收鬼治病使役鬼神七者身香體潔骨髓芳馨勇猛智慧髙才聰明克昇上仙白日登天仙度之後與道合同
