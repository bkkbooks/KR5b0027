body:
  text: 祝中食法元始大聖朗遧玄微日月齊明三寳同輝曽治梵行度人不衰三塗永離五苦咸解是名飛天法輪今日齋主至徳奉請衆賢行香設禮獻供隨方歸命法門戒身立德施設厨飯願四海清寜七祖歡泰三道濟濟帝王延祚當今齋主某甲析請之後承是功德普通十方仰徹諸天禍滅九隂福生十極慶有盈餘七世父母去離九隂長夜三塗薦懴之後徑昇天堂長處光輝錬形朱宫輪轉化生合門大小聰明智慧百病除愈四體輕強運度惡世逍遥三界德鍾天下一切衆生普同福願行與神合得道自然祝人布施中食及解厨并齋飯法今爲某甲請設齋食當願一切無不飽滿世享天厨德流齋主如水歸海宗枝徹長常處貴盛世與四輩俱生快樂七世父母得免長夜九幽之府魂神自在災消福降生死昇仙當願齋主世世願得善心立德敬道護法種因所向得福行道得道求仙得仙身神安寜華色精光行來四出善神開導若荷戒録吏兵衛從合門見在咸得安全若有疾病皆得除愈各保年壽所願必從位禄自至不今迍蹇惡魔消滅鬼妖降伏日月星辰天地神祇常當保護侍衛門戸千災不干萬難咸脫見世受福終得仙道布施衆生祝法勤修大道法精誠感太㝠眞降魔魅散衆妖皆滅形七祖昇南宫兆身登上清福利無不普餘食賜衆生受布施祝願法歸身歸神歸命太上三尊今是布施當願齋主慶及一切禍滅九隂福生十方德如山海莫不興昌七祖生天子孫賢忠冨貴巍巍所欲皆從學道昇仙駕雲乘龍齋主某甲歸心道法能减損財寳餘物施爲功德當願施一之財無量之報功多報重恒與善會世世因縁豐樂不絶見在大小常無疾痾終保髙壽世生賢才智慧明徹三界保敬眞神衛侍五方正神擁護門戸常居安全邪魔束形鬼精滅爽宅舍安穩災異不起受福無極遂得昇度分形變化一切預是有情導以法文皆得與道合同解齋餘食乞衆生祝法今日是何日齋戒向太上服食天行厨役使今月將兆等昇南仙齋主福無量燒香奏至誠功德普盡暢吾今所說四方願祝大法若能精心修持得福無量戒愼之焉太上洞玄靈寳四方大願經
